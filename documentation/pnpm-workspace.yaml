packages: []

# Supply-chain freshness: keep a 1-day floor for third-party packages but
# exempt every CourtHive-published package so cross-repo release cascades
# (factory -> components -> docs consuming both) don't trip the policy.
# Mirrors the root pnpm-workspace.yaml — documentation is its own pnpm
# context so the setting has to be duplicated here.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - 'tods-competition-factory'
  - 'courthive-*'
  - '@courthive/*'
  - 'pdf-factory'
  - 'scoring-visualizations'
  - 'tabulator-scorecards'

# Security overrides for transitive deps of the Docusaurus docs build (not
# part of the published package). pnpm v11 reads overrides from here, not from
# `pnpm.overrides` in package.json when this workspace file is present.
# - serialize-javascript: GHSA-5c6j-r48x-rmvq (RCE, high) + GHSA-qj8w-gfj5-8c6v
#   (DoS); patched 7.0.5.
# - uuid: GHSA-w5hq-g745-h8pq (missing buffer bounds check); patched >= 11.1.1.
overrides:
  serialize-javascript: '^7.0.5'
  uuid: '^14.0.0'
  webpackbar: '7.0.0'

allowBuilds:
  core-js: true
  esbuild: true

ignoredBuiltDependencies:
  - core-js-pure
  - puppeteer
