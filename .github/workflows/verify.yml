name: Verify

# Runs the full verification suite on every PR + push to main. The `verify`
# script is also wired into `prepublishOnly`, so this acts as the canary —
# any check that fails here will also block publish, but here we catch it
# at PR time instead of at release-tag time.
#
# Ecosystem sweep is intentionally NOT run in CI here — sibling consumer
# repos aren't checked out. Maintainers run `pnpm verify:ecosystem` locally
# when needed. CI tests the factory in isolation across the supported Node
# matrix.

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Opt JavaScript actions (e.g. actions/cache) into Node 24 before
# GitHub's June 16 2026 forced cutover; silences the Node-20 deprecation
# warning today and de-risks the runner-side migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    # Skip when the head commit is the release-please bot's release-PR
    # merge. Release-please PRs touch only CHANGELOG.md, package.json
    # (version bump), and .release-please-manifest.json — never any
    # tested source. The same commit was just verified one push ago
    # when the feature/fix that triggered the release landed on master,
    # so re-running the full matrix here adds ~9 min × 2 nodes of CI
    # for no new signal. The subsequent `npm-publish.yml` run (fired
    # by release-please creating the GitHub release) gates the publish
    # via prepublishOnly → pnpm verify, so verification still happens
    # before any artifact ships to npm.
    #
    # PR events (which the bot opens before merging) always run — only
    # the resulting merge push is skipped.
    if: >
      github.event_name != 'push' ||
      !contains(github.event.head_commit.message, 'release-please--branches--')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    name: verify (node ${{ matrix.node-version }})

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      # pnpm via corepack (driven by `packageManager` in package.json). The
      # repo's allowed-actions policy blocks third-party actions like
      # pnpm/action-setup, so we avoid them and stay on actions/* only.
      - run: corepack enable

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-pnpm-

      - run: pnpm install --frozen-lockfile --ignore-scripts

      # In-CI verify minus the ecosystem sweep (siblings aren't here).
      # Order: cheap fail-fast → expensive checks last.
      - name: verify:types
        run: pnpm verify:types

      - name: verify:lint
        run: pnpm verify:lint

      - name: verify:coverage
        run: pnpm verify:coverage

      - name: verify:server
        run: pnpm verify:server

      - name: verify:audit
        run: pnpm verify:audit

      - name: verify:build
        run: pnpm verify:build

      - name: verify:publint
        run: pnpm verify:publint

      - name: verify:runtime
        run: pnpm verify:runtime

      - name: verify:bundle-size
        run: pnpm verify:bundle-size

      - name: verify:surface
        run: pnpm verify:surface

      - name: verify:pack
        run: pnpm verify:pack
