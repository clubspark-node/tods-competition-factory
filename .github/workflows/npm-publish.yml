name: Publish to npm

# Fires when a GitHub release is published. release-please creates
# releases via GITHUB_TOKEN, and `release: published` is delivered
# regardless of which token created it — unlike `push: tags`, which
# GitHub silently drops when triggered by GITHUB_TOKEN to prevent
# workflow loops. That gap is why v3.1.5 was tagged but never
# auto-published.
#
# `workflow_dispatch` is kept for manual backfill — pass a `tag`
# input (e.g. `v3.1.5`) to publish a tag that already exists.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v3.1.5). Must already exist.'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: corepack enable

      - run: npm install --legacy-peer-deps --ignore-scripts

      - run: npm run lint

      - run: npm run check-types

      - run: npm run build

      # NOTE: vitest + jest-server are intentionally NOT run here as
      # explicit steps. `npm publish` below invokes `prepublishOnly`
      # (= `pinst --disable && pnpm verify`), and the `verify` script
      # already runs verify:coverage (vitest) + verify:server (jest)
      # along with the rest of the verification suite. Running them
      # again here was duplicating ~9 min of test time per release.
      # The PR-time `verify.yml` workflow remains the first line of
      # defense; this `prepublishOnly` gate is the tag-time safety net.

      - name: Determine npm dist-tag
        id: distTag
        run: |
          VERSION="${{ steps.ref.outputs.version }}"
          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - run: npm publish --provenance --access public --tag ${{ steps.distTag.outputs.tag }}
