allowBuilds:
  '@dep-tree/cli': true
  '@nestjs/core': true
  '@scarf/scarf': true
  '@swc/core': true
  esbuild: true
  unrs-resolver: true

# pnpm v11 reads project-level settings from pnpm-workspace.yaml (not from
# .npmrc, which pnpm v11.1.3 no longer merges for non-auth keys).
#
# minimumReleaseAge: 1440 (1 day, in minutes) keeps pnpm v11's supply-chain
#   freshness check active for third-party packages — protects against
#   typosquat + compromised-publish attacks that rely on installs hitting
#   a brand-new version within minutes of publish.
# minimumReleaseAgeExclude exempts every package we publish ourselves so
#   cross-package CourtHive releases (factory -> components -> TMX cascade,
#   etc.) don't get blocked by their own freshness — we routinely consume
#   our own packages within hours of publishing them.
# verifyDepsBeforeRun: false suppresses the deps-status check that fires
#   before every `pnpm <script>` invocation. Lockfiles are routinely
#   briefly stale (mentat-pull-all.sh deletes lockfiles before each
#   build cycle), so the check is noise.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - 'tods-competition-factory'
  - 'courthive-*'
  - '@courthive/*'
  - 'pdf-factory'
  - 'scoring-visualizations'
  - 'tabulator-scorecards'
  # Renovate security update: esbuild@0.28.1
  - esbuild@0.28.1
verifyDepsBeforeRun: false

# Security overrides for transitive (dev-only) dependencies. pnpm v11 reads
# overrides from pnpm-workspace.yaml; `pnpm.overrides` in package.json is
# ignored when this file is present.
# - qs: GHSA-q8mj-m7cp-5q26 (DoS in stringify); patched 6.15.2. Pulled in via
#   dev/test tooling (body-parser, supertest) only — not a runtime dependency.
# - form-data: GHSA-hmw2-7cc7-3qxx (CRLF injection); patched 4.0.6. Via supertest/superagent.
# - multer: GHSA-72gw-mp4g-v24j (DoS via nested field names); patched 2.2.0. Via @nestjs/platform-express.
# - brace-expansion: GHSA-v6h2-p8h4-qcjw (ReDoS via exponential expansion); patched 1.1.16 / 2.1.2.
#   Two lines present (v1 via minimatch@3, v2 via other jest tooling) — patch each major separately.
# - js-yaml: GHSA-724g-mxrg-4qvm (quadratic-complexity DoS via !!omap tag); patched 5.2.1.
#   Only the v5 line is vulnerable (via markdownlint-cli2); 3.x/4.x consumers are unaffected.
overrides:
  typescript: 6.0.3 # block native TS7 (no classic JS API — crashes tsc/nest/sonarjs); pairs with renovate TS-major block
  qs: '^6.15.2'
  form-data: '>=4.0.6'
  multer: '>=2.2.0'
  brace-expansion@1: '>=1.1.16'
  brace-expansion@2: '>=2.1.2'
  js-yaml@5: '>=5.2.1'
